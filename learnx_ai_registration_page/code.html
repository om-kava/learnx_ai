<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Create Account | LearnX</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#1032cf",
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        :root {
            --primary: #1032cf;
            --primary-dark: #000e5e;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --slate-50: #f8fafc;
        }

        body {
            background-color: var(--slate-50);
            color: var(--slate-900);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            font-weight: 700;
        }

        .primary-btn-gradient {
            background: linear-gradient(135deg, #1032cf 0%, #314be3 100%);
            box-shadow: 0 10px 25px -5px rgba(16, 50, 207, 0.2);
            border: none;
            color: #ffffff !important;
            transition: all 0.3s ease;
        }

        .primary-btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(16, 50, 207, 0.35);
        }

        .text-gradient-primary {
            background: linear-gradient(135deg, #1032cf 0%, #314be3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .floating-ui {
            animation: float 6s ease-in-out infinite;
        }

        .glow-input:focus {
            box-shadow: 0 0 20px rgba(16, 50, 207, 0.1);
            border-color: var(--primary) !important;
        }

        .role-radio:checked + label {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 30px -10px rgba(16, 50, 207, 0.4);
            border-color: var(--primary);
        }

        /* Enforce Black Font Rule */
        h1, h2, h3, h4, h5, h6, b, strong, .font-bold, .font-black {
            color: var(--slate-900) !important;
            font-weight: 900 !important;
        }

        p, span, div, a, label {
            font-weight: 700;
        }
        
        .light-text-override, .light-text-override span {
            color: var(--slate-900);
        }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-body selection:bg-primary/20 min-h-screen overflow-hidden">
    <!-- Decorative Accents -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
    </div>

    <main class="relative z-10 h-screen flex flex-col md:flex-row overflow-hidden">
        <!-- Visual Anchor -->
        <section class="relative w-full md:w-5/12 h-[30vh] md:h-full flex items-center justify-center p-8 md:p-24 overflow-hidden border-r border-slate-200 bg-white flex-shrink-0">
            <div class="relative z-10 space-y-12 reveal">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 border border-slate-200 text-primary font-black text-xs uppercase tracking-widest mb-6">
                    <span class="material-symbols-outlined text-sm">school</span>
                    AI Learning Platform
                </div>
                <h1 class="text-3xl font-black font-headline tracking-tighter text-slate-900 mb-6 floating-ui">LearnX <span class="text-primary">AI</span></h1>
                
                <h2 class="font-headline text-5xl md:text-8xl font-black text-slate-900 tracking-tighter leading-[0.9]">
                    The New <br/><span class="text-gradient-primary">Standard.</span>
                </h2>
                <div class="space-y-6 max-w-sm">
                    <p class="text-slate-500 text-xl font-bold leading-relaxed opacity-80 light-text-override">Join the elite ecosystem for academic excellence and rapid insight.</p>
                </div>
            </div>
        </section>

        <!-- Dedicated Interaction Hub -->
        <section class="flex-1 h-full bg-slate-50 relative overflow-y-auto overflow-x-hidden">
            <div class="min-h-full w-full flex items-center justify-center p-8 md:p-12">
                <div class="w-full max-w-md space-y-8 py-10">
                <div class="reveal">
                    <h3 class="text-3xl font-black font-headline text-slate-900 tracking-tighter mb-2 uppercase">Create Account</h3>
                    <p class="text-slate-500 font-bold text-base leading-relaxed">Join 50,000+ top-tier learners worldwide.</p>
                </div>

                <form class="space-y-6">
                    <!-- Segmented Role Selector -->
                    <div class="p-1 bg-white border border-slate-200 rounded-2xl flex relative reveal" style="transition-delay: 50ms;">
                        <div class="flex-1 relative">
                            <input class="hidden role-radio" id="student" name="role" type="radio" checked/>
                            <label class="flex items-center justify-center py-4 rounded-xl cursor-pointer text-slate-600 text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300" for="student">Student</label>
                        </div>
                        <div class="flex-1 relative">
                            <input class="hidden role-radio" id="faculty" name="role" type="radio"/>
                            <label class="flex items-center justify-center py-4 rounded-xl cursor-pointer text-slate-600 text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300" for="faculty">Faculty</label>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div class="space-y-2 reveal" style="transition-delay: 100ms;">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Full Name</label>
                            <input class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-6 text-slate-900 font-bold transition-all duration-300 glow-input placeholder:text-slate-400 text-sm focus:outline-none" placeholder="John Doe" type="text"/>
                        </div>

                        <div class="space-y-2 reveal" style="transition-delay: 200ms;">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                            <input class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-6 text-slate-900 font-bold transition-all duration-300 glow-input placeholder:text-slate-400 text-sm focus:outline-none" placeholder="user@learnx.ai" type="email"/>
                        </div>

                        <div class="grid grid-cols-2 gap-4 reveal" style="transition-delay: 300ms;">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Password</label>
                                <input class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-6 text-slate-900 font-bold transition-all duration-300 glow-input placeholder:text-slate-400 text-sm focus:outline-none" placeholder="••••••••" type="password"/>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Confirm</label>
                                <input class="w-full bg-white border border-slate-200 rounded-2xl py-4 px-6 text-slate-900 font-bold transition-all duration-300 glow-input placeholder:text-slate-400 text-sm focus:outline-none" placeholder="••••••••" type="password"/>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 reveal" style="transition-delay: 400ms;">
                        <button class="w-full py-5 primary-btn-gradient rounded-2xl text-white font-black text-xs uppercase tracking-[0.3em] transition-all flex items-center justify-center gap-3" type="submit">
                            <span style="color: white !important;">Initialize Profile</span>
                            <span class="material-symbols-outlined text-sm" style="color: white !important;">bolt</span>
                        </button>
                    </div>
                </form>

                <div class="text-center reveal" style="transition-delay: 500ms;">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                        Already verified? 
                        <a class="text-primary hover:text-primary-dark transition-colors ml-1 font-black" href="../learnx_ai_login_page/code.html">Sign In Here</a>
                    </p>
                </div>

                <div class="pt-8 border-t border-slate-200 flex justify-between items-center opacity-70 reveal" style="transition-delay: 600ms;">
                    <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">LearnX Portal v4.0</span>
                    <div class="flex gap-6">
                        <a class="text-[9px] text-slate-500 font-black uppercase tracking-widest hover:text-primary" href="#">Support</a>
                        <a class="text-[9px] text-slate-500 font-black uppercase tracking-widest hover:text-primary" href="#">Privacy</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = { threshold: 0.1 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, observerOptions);
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
