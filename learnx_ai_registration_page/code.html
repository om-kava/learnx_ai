<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Create Account | LearnX AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bbc3ff",
                        "background": "#0b0c10",
                        "surface": "#111318",
                        "on-surface": "#e2e2e8",
                        "primary-container": "#1032cf",
                        "secondary-container": "#ca04b7",
                        "surface-container-low": "#16181d",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(30, 32, 36, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, #bbc3ff 0%, #314be3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes blob-animation {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob-animation 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-radio:checked + label {
            background: #1032cf;
            color: white;
            box-shadow: 0 10px 30px -10px rgba(16, 50, 207, 0.4);
            border-color: #1032cf;
        }
        .input-elite:focus {
            background: rgba(22, 24, 29, 0.8);
            box-shadow: 0 0 0 4px rgba(16, 50, 207, 0.1);
            border-color: rgba(16, 50, 207, 0.4);
        }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/20 min-h-screen overflow-hidden">
    <!-- Immersive Kinetics -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-[70%] h-[70%] rounded-full bg-primary-container/10 blur-[150px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[60%] h-[60%] rounded-full bg-secondary-container/5 blur-[130px] animate-blob" style="animation-delay: -5s"></div>
    </div>

    <main class="relative z-10 min-h-screen flex flex-col md:flex-row">
        <!-- Visual Anchor -->
        <section class="relative w-full md:w-5/12 min-h-[40vh] md:min-h-screen flex items-center justify-center p-12 md:p-24 overflow-hidden border-r border-white/5 bg-surface-container-low/20">
            <div class="relative z-10 space-y-12 reveal">
                <div class="flex items-center gap-3">
                    <span class="text-3xl font-black font-headline tracking-tighter text-white">LearnX AI</span>
                </div>
                <h2 class="font-headline text-5xl md:text-8xl font-black text-white tracking-tighter leading-[0.9]">
                    The New <br/><span class="text-gradient-primary">Standard.</span>
                </h2>
                <div class="space-y-6 max-w-sm">
                    <p class="text-on-surface-variant text-xl font-medium leading-relaxed opacity-60">Join the elite ecosystem for academic excellence and rapid insight.</p>
                </div>
            </div>
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-primary/20 rounded-full blur-[100px] opacity-40"></div>
        </section>

        <!-- Dedicated Interaction Hub -->
        <section class="flex-1 min-h-screen h-screen flex items-center justify-center relative bg-background/20 backdrop-blur-xl overflow-y-auto">
            <div class="w-full max-w-md space-y-10 p-8 md:p-12 reveal">
                <header class="space-y-3">
                    <h3 class="text-3xl md:text-4xl font-black font-headline text-white tracking-tighter">Create Account</h3>
                    <p class="text-on-surface-variant font-medium opacity-60">Join 50,000+ top-tier learners worldwide.</p>
                </header>

                <form class="space-y-6">
                    <!-- Segmented Role Selector -->
                    <div class="p-1 bg-surface-container-low border border-white/5 rounded-2xl flex relative reveal" style="transition-delay: 50ms;">
                        <div class="flex-1 relative">
                            <input class="hidden role-radio" id="student" name="role" type="radio" checked/>
                            <label class="flex items-center justify-center py-4 rounded-xl cursor-pointer text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300" for="student">Student</label>
                        </div>
                        <div class="flex-1 relative">
                            <input class="hidden role-radio" id="faculty" name="role" type="radio"/>
                            <label class="flex items-center justify-center py-4 rounded-xl cursor-pointer text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300" for="faculty">Faculty</label>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div class="space-y-2 reveal" style="transition-delay: 100ms;">
                            <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 opacity-50">Full Name</label>
                            <input class="w-full bg-surface-container-low/50 border border-white/5 rounded-2xl py-4 px-6 text-white font-bold transition-all duration-300 input-elite placeholder:text-slate-700 text-sm" placeholder="John Doe" type="text"/>
                        </div>

                        <div class="space-y-2 reveal" style="transition-delay: 200ms;">
                            <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 opacity-50">Email Address</label>
                            <input class="w-full bg-surface-container-low/50 border border-white/5 rounded-2xl py-4 px-6 text-white font-bold transition-all duration-300 input-elite placeholder:text-slate-700 text-sm" placeholder="user@learnx.ai" type="email"/>
                        </div>

                        <div class="grid grid-cols-2 gap-4 reveal" style="transition-delay: 300ms;">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 opacity-50">Password</label>
                                <input class="w-full bg-surface-container-low/50 border border-white/5 rounded-2xl py-4 px-6 text-white font-bold transition-all duration-300 input-elite placeholder:text-slate-700 text-sm" placeholder="••••••••" type="password"/>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest ml-1 opacity-50">Confirm</label>
                                <input class="w-full bg-surface-container-low/50 border border-white/5 rounded-2xl py-4 px-6 text-white font-bold transition-all duration-300 input-elite placeholder:text-slate-700 text-sm" placeholder="••••••••" type="password"/>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 reveal" style="transition-delay: 400ms;">
                        <button class="w-full py-5 bg-gradient-to-r from-primary-container via-[#314be3] to-[#7c3aed] rounded-2xl text-white font-black text-xs uppercase tracking-[0.3em] hover:scale-[1.02] hover:shadow-[0_20px_50px_-10px_rgba(16,50,207,0.5)] active:scale-95 transition-all flex items-center justify-center gap-3" type="submit">
                            Initialize Profile
                            <span class="material-symbols-outlined text-sm">bolt</span>
                        </button>
                    </div>
                </form>

                <div class="text-center reveal" style="transition-delay: 500ms;">
                    <p class="text-[10px] font-bold text-on-surface-variant opacity-60 uppercase tracking-widest">
                        Already verified? 
                        <a class="text-primary hover:text-white transition-colors ml-1 font-black" href="../learnx_ai_login_page/code.html">Sign In Here</a>
                    </p>
                </div>

                <div class="pt-8 border-t border-white/5 flex justify-between items-center opacity-30 reveal" style="transition-delay: 600ms;">
                    <span class="text-[9px] text-white font-black uppercase tracking-widest">LearnX AI Portal v4.0</span>
                    <div class="flex gap-6">
                        <a class="text-[9px] text-white font-black uppercase tracking-widest hover:text-primary" href="#">Support</a>
                        <a class="text-[9px] text-white font-black uppercase tracking-widest hover:text-primary" href="#">Privacy</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = { threshold: 0.1 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, observerOptions);
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
